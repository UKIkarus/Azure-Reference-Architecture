# .github/workflows/bicep-ci.yml
#
# Bicep CI/CD pipeline - validates all Bicep modules in this repository.
#
# Triggers:
#   • Pull request to main - full validation gate (must pass before merge)
#   • Push to main - what-if gate confirming the merged state is deployment-ready
#
# Pipeline policy: every step must pass before the next runs.
# Any failure (secret scan, lint, build, PSRule, what-if) halts the pipeline immediately.
# Do NOT add continue-on-error to any step.
#
# Authentication: OIDC federated identity only. Client secrets are prohibited.
# Store as GitHub Actions repository variables (not secrets):
#   AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID, AZURE_RG, AZURE_RG_LOCATION
#
# See "OIDC federated credential setup" for bootstrap commands.
# These variables contain non-sensitive IDs and are safe to store as variables (not secrets).

name: Bicep CI

on:
  pull_request:
    branches: [main]
    paths:
      - '**/bicep/**.bicep'
      - '**/bicep/**.bicepparam'
      - '.github/workflows/bicep-ci.yml'
      - '.ps-rule/**'
      - 'bicepconfig.json'
  push:
    branches: [main]
    paths:
      - '**/bicep/**.bicep'
      - '**/bicep/**.bicepparam'
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Deploy after validation? (must be "true" to deploy - omit to validate only)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

# Minimum required permissions for OIDC token request and PR annotation
permissions:
  id-token: write      # Required: request OIDC JWT token from GitHub
  contents: read       # Required: checkout source code
  pull-requests: write # Required: annotate PR with PSRule SARIF results

# Module matrix - add new entries as modules are built out
# Each entry defines the entry-point bicep file and its parameter file
env:
  BICEP_FILE:  '01-Core-Networking/bicep/main.bicep'
  PARAM_FILE:  '01-Core-Networking/bicep/main.bicepparam'

jobs:
  # ── Validation ──────────────────────────────────────────────────────────────
  # Runs on every PR and push to main.
  # Validates: secret scan → lint → build → PSRule → what-if
  validate:
    name: Validate Bicep modules
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Full history required for betterleaks git history scan
          fetch-depth: 0

      # ── Step 1: Secret scan - betterleaks ─────────────────────────────────
      # Scans entire git history for secrets, API keys, connection strings.
      # Exit code 1 on any finding - pipeline stops here and reports findings.
      # betterleaks is preferred over detect-secrets: scans git history, not just working tree.
      - name: Install betterleaks
        run: |
          # Resolve the linux_x64 asset URL dynamically so this step survives future releases.
          # The release filename includes the version (e.g. betterleaks_1.3.1_linux_x64.tar.gz)
          # and would break if hardcoded. The GitHub API always returns the latest release metadata.
          DOWNLOAD_URL=$(curl -sSL https://api.github.com/repos/betterleaks/betterleaks/releases/latest \
            | grep -o 'https://[^"]*linux_x64\.tar\.gz' | head -1)
          echo "Downloading betterleaks from: $DOWNLOAD_URL"
          curl -sSL "$DOWNLOAD_URL" | tar xz -C /tmp
          sudo mv /tmp/betterleaks /usr/local/bin/betterleaks

      - name: Run betterleaks secret scan
        run: betterleaks git . -v
        # Exit code 1 on any secret found - pipeline halts and reports the finding.
        # Remediate: remove the secret, rotate it, then re-run from Step 1.

      # ── Step 2: Install Bicep CLI ─────────────────────────────────────────
      - name: Install Bicep CLI
        run: |
          curl -Lo bicep https://github.com/Azure/bicep/releases/latest/download/bicep-linux-x64
          chmod +x bicep
          sudo mv bicep /usr/local/bin/bicep
          bicep --version
          # Also install az bicep so PSRule can find it at ~/.azure/bin/bicep.
          # ps-rule.yaml sets AZURE_BICEP_USE_AZURE_CLI: true which routes PSRule
          # through 'az bicep build' rather than the standalone binary.
          # Without this, Bicep expansion silently produces 0 resources.
          az bicep install

      # ── Step 3: Bicep lint ────────────────────────────────────────────────
      # Applies bicepconfig.json rules - no Azure credentials required.
      # Errors (not warnings) from bicepconfig.json rules fail this step.
      - name: Lint - 01-Core-Networking
        run: |
          mkdir -p reports
          bicep lint ${{ env.BICEP_FILE }} --diagnostics-format sarif 2>&1 | tee reports/lint.sarif

      # ── Step 4: Bicep build ───────────────────────────────────────────────
      # Compiles to ARM JSON - catches type errors, schema violations, BCP diagnostics.
      - name: Build - 01-Core-Networking main.bicep
        run: bicep build ${{ env.BICEP_FILE }}

      - name: Build - 01-Core-Networking main.bicepparam
        run: bicep build-params ${{ env.PARAM_FILE }}

      # ── Step 5: PSRule for Azure ──────────────────────────────────────────
      # Runs the same script as 'bash scripts/validate-local.sh' locally.
      # Using the script (rather than microsoft/ps-rule@v2) ensures:
      #   - Identical baseline (Local.AzureNetworking - Security + Reliability only)
      #   - Identical Bicep expansion path (AZURE_BICEP_USE_AZURE_CLI via az bicep)
      #   - Identical summary output format (PSRULE_SUMMARY:Pass=N;Fail=N)
      #   - Suppression rules from ps-rule.yaml applied consistently
      - name: Run PSRule for Azure
        id: psrule
        run: |
          set +e
          OUTPUT=$(pwsh scripts/_psrule-run.ps1 -BicepFile '${{ env.BICEP_FILE }}' -SarifOut reports/psrule.sarif 2>&1)
          EXIT=$?
          echo "$OUTPUT"
          # Extract summary line for the job summary step
          SUMMARY=$(echo "$OUTPUT" | grep 'PSRULE_SUMMARY:' | tail -1 | sed 's/PSRULE_SUMMARY://')
          echo "psrule_summary=$SUMMARY" >> "$GITHUB_OUTPUT"
          exit $EXIT

      - name: PSRule summary
        if: always()
        run: |
          SUMMARY="${{ steps.psrule.outputs.psrule_summary }}"
          # Parse Pass=N;Fail=N;Error=N;Resources=N into individual values
          PASS=$(echo    "$SUMMARY" | grep -oP 'Pass=\K\d+')
          FAIL=$(echo    "$SUMMARY" | grep -oP 'Fail=\K\d+')
          ERROR=$(echo   "$SUMMARY" | grep -oP 'Error=\K\d+')
          RESOURCES=$(echo "$SUMMARY" | grep -oP 'Resources=\K\d+')
          PASS=${PASS:-0}; FAIL=${FAIL:-0}; ERROR=${ERROR:-0}; RESOURCES=${RESOURCES:-0}

          if   [[ "$FAIL" -gt 0 || "$ERROR" -gt 0 ]]; then BADGE="❌ Failed"
          elif [[ "$PASS" -gt 0 ]];                    then BADGE="✅ Passed"
          else                                               BADGE="⚠️ No results"
          fi

          {
            echo "## PSRule for Azure - 01-Core-Networking"
            echo ""
            echo "| | Count |"
            echo "|---|---|"
            echo "| ✅ Pass | $PASS |"
            echo "| ❌ Fail | $FAIL |"
            echo "| 🔴 Error | $ERROR |"
            echo "| 📦 Resources evaluated | $RESOURCES |"
            echo ""
            echo "**Baseline:** \`Local.AzureNetworking\` (Security + Reliability — $(( PASS + FAIL + ERROR )) checks)"
            echo "**Result:** $BADGE"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload PSRule SARIF report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: psrule-sarif
          path: reports/psrule.sarif

      # ── Step 6: OIDC login ────────────────────────────────────────────────
      # Federated identity only - no client secrets.
      # Variables (not secrets) are safe to store in GitHub repository settings.
      # Bootstrap: see "OIDC federated credential setup".
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ vars.AZURE_CLIENT_ID }}
          tenant-id:       ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      # ── Step 6a: Ensure resource group exists ─────────────────────────────
      # This module deploys at resourceGroup scope (ADR-11). The RG must exist
      # before what-if or deploy can run. az group create is idempotent.
      - name: Ensure resource group exists
        run: |
          az group create \
            --name        ${{ vars.AZURE_RG }} \
            --location    ${{ vars.AZURE_RG_LOCATION }} \
            --tags        module=01-core-networking managed-by=bicep-ci

      # ── Step 7: What-if (required gate) ──────────────────────────────────
      # Read-only preview of what Azure would change if the template were deployed.
      # Acceptable result: zero unexpected Modify or Delete changes on a net-new template.
      # Unexpected changes must be explained and approved before the PR can merge.
      - name: What-if - 01-Core-Networking
        uses: azure/arm-deploy@v2
        with:
          scope: resourcegroup
          resourceGroupName: ${{ vars.AZURE_RG }}
          template:   ${{ env.BICEP_FILE }}
          parameters: ${{ env.PARAM_FILE }}
          additionalArguments: '--what-if'
        # What-if is a read-only operation - no resources are created or modified.
        # A non-zero exit code means the template has errors or unexpected changes.

  # ── Deploy (manual trigger only - never runs automatically) ───────────────
  # Deployment via Bicep Stacks provides state management and drift protection.
  # This job is NEVER triggered automatically - it requires explicit workflow_dispatch.
  # Before deploying, confirm what-if passed in the validate job above.
  deploy:
    name: Deploy via Bicep Stack (manual only)
    runs-on: ubuntu-latest
    needs: validate
    # Only runs when explicitly requested AND the deploy input is set to 'true'.
    # A plain workflow_dispatch (validate-only run) will skip this job entirely.
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.deploy == 'true'
    environment: production  # Requires manual approval gate in GitHub Environments

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Bicep CLI
        run: |
          curl -Lo bicep https://github.com/Azure/bicep/releases/latest/download/bicep-linux-x64
          chmod +x bicep && sudo mv bicep /usr/local/bin/bicep

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ vars.AZURE_CLIENT_ID }}
          tenant-id:       ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure resource group exists
        run: |
          az group create \
            --name        ${{ vars.AZURE_RG }} \
            --location    ${{ vars.AZURE_RG_LOCATION }} \
            --tags        module=01-core-networking managed-by=bicep-ci

      # Deploy via Bicep Stack - provides lifecycle management and drift protection.
      # denyWriteAndDelete blocks all portal writes and deletes on stack-managed resources.
      # deleteResources removes Azure resources when removed from the template (no orphans).
      - name: Deploy stack - 01-Core-Networking
        run: |
          az stack group create \
            --name '01-core-networking' \
            --resource-group ${{ vars.AZURE_RG }} \
            --template-file ${{ env.BICEP_FILE }} \
            --parameters ${{ env.PARAM_FILE }} \
            --deny-settings-mode denyWriteAndDelete \
            --action-on-unmanage deleteResources \
            --yes
